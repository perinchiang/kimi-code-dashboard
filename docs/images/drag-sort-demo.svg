<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="620" viewBox="0 0 1440 620" role="img" aria-labelledby="title desc">
  <title id="title">整卡拖拽排序交互示意图</title>
  <desc id="desc">展示卡片原位撬起、目标位置让开、松开后完成排序的三个阶段。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#242b35"/>
      <stop offset="1" stop-color="#1b222c"/>
    </linearGradient>
    <linearGradient id="lifted" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#315d88"/>
      <stop offset="1" stop-color="#233c5a"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000" flood-opacity=".48"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity=".25"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#79b8ff"/>
    </marker>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #e6edf3; }
      .stage { font: 700 18px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #79b8ff; }
      .caption { font: 500 15px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #8b949e; }
      .card-title { font: 700 17px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #e6edf3; }
      .card-meta { font: 500 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #8b949e; }
      .badge { font: 600 11px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #79b8ff; }
      .number { font: 700 15px 'Segoe UI', sans-serif; fill: #0d1117; }
    </style>
  </defs>

  <rect width="1440" height="620" rx="24" fill="url(#bg)"/>
  <text x="64" y="62" class="title">整卡拖拽排序：像从文件夹里“撬起”一张卡片</text>
  <text x="64" y="91" class="caption">原位置保留拖动反馈，目标位置让开，松手后完成顺序交换</text>

  <!-- Stage 1 -->
  <g transform="translate(64,142)">
    <circle cx="22" cy="22" r="18" fill="#58a6ff"/>
    <text x="16" y="28" class="number">1</text>
    <text x="54" y="29" class="stage">按住卡片</text>
    <text x="0" y="57" class="caption">原卡片还在原位，开始浮起</text>
    <rect x="0" y="88" width="350" height="350" rx="14" fill="#0b1016" stroke="#30363d"/>
    <g transform="translate(28,120)">
      <rect width="294" height="74" rx="10" fill="url(#card)" stroke="#30363d" filter="url(#soft)"/>
      <text x="20" y="30" class="card-title">Provider A</text>
      <text x="20" y="53" class="card-meta">OpenAI 兼容 · 已连接</text>
    </g>
    <g transform="translate(28,214)">
      <rect width="294" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
      <text x="20" y="30" class="card-title">Provider B</text>
      <text x="20" y="53" class="card-meta">Anthropic Claude</text>
    </g>
    <g transform="translate(28,308)">
      <rect width="294" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
      <text x="20" y="30" class="card-title">Provider C</text>
      <text x="20" y="53" class="card-meta">Kimi / Moonshot</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <path d="M438 315 C475 275, 495 250, 535 235" fill="none" stroke="#79b8ff" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <g transform="translate(548,142)">
    <circle cx="22" cy="22" r="18" fill="#58a6ff"/>
    <text x="16" y="28" class="number">2</text>
    <text x="54" y="29" class="stage">拖动中</text>
    <text x="0" y="57" class="caption">原位“撬起”，目标位置让开</text>
    <rect x="0" y="88" width="350" height="350" rx="14" fill="#0b1016" stroke="#30363d"/>
    <g transform="translate(28,120)">
      <rect width="294" height="74" rx="10" fill="url(#card)" stroke="#30363d" opacity=".7"/>
      <text x="20" y="30" class="card-title" opacity=".55">Provider A</text>
      <text x="20" y="53" class="card-meta" opacity=".55">原位置保留</text>
    </g>
    <g transform="translate(28,214)">
      <rect width="294" height="74" rx="10" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="7 6" opacity=".85"/>
      <text x="147" y="44" text-anchor="middle" class="badge">放置位置</text>
    </g>
    <g transform="translate(54,178) rotate(-7 147 37)" filter="url(#shadow)">
      <rect width="294" height="74" rx="10" fill="url(#lifted)" stroke="#79b8ff" stroke-width="2"/>
      <text x="20" y="30" class="card-title">Provider A</text>
      <text x="20" y="53" class="card-meta">像从文件夹里撬出来</text>
    </g>
    <path d="M175 147 C210 112, 258 107, 302 138" fill="none" stroke="#79b8ff" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
    <g transform="translate(28,308)">
      <rect width="294" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
      <text x="20" y="30" class="card-title">Provider C</text>
      <text x="20" y="53" class="card-meta">被目标位置让开</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <path d="M922 315 C966 315, 987 315, 1028 315" fill="none" stroke="#79b8ff" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <g transform="translate(1040,142)">
    <circle cx="22" cy="22" r="18" fill="#3fb950"/>
    <text x="16" y="28" class="number">3</text>
    <text x="54" y="29" class="stage" fill="#3fb950">松开落位</text>
    <text x="0" y="57" class="caption">卡片落入目标位置，顺序完成交换</text>
    <rect x="0" y="88" width="350" height="350" rx="14" fill="#0b1016" stroke="#30363d"/>
    <g transform="translate(28,120)">
      <rect width="294" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
      <text x="20" y="30" class="card-title">Provider B</text>
      <text x="20" y="53" class="card-meta">顺序后移</text>
    </g>
    <g transform="translate(28,214)">
      <rect width="294" height="74" rx="10" fill="url(#lifted)" stroke="#3fb950" stroke-width="2" filter="url(#soft)"/>
      <text x="20" y="30" class="card-title">Provider A</text>
      <text x="20" y="53" class="card-meta">已落入目标位置</text>
    </g>
    <g transform="translate(28,308)">
      <rect width="294" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
      <text x="20" y="30" class="card-title">Provider C</text>
      <text x="20" y="53" class="card-meta">顺序不变</text>
    </g>
  </g>

  <text x="720" y="575" text-anchor="middle" class="caption">你描述的效果重点：原位有“撬起”的视觉反馈，而不是原卡片直接消失</text>
</svg>
